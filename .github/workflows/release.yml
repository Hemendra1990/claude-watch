name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4

      - name: Restore signing material
        run: |
          mkdir -p signing
          printf '%s' "${{ secrets.CERTIFICATE_CHAIN }}" > signing/chain.crt
          printf '%s' "${{ secrets.PRIVATE_KEY }}"       > signing/private.pem

      - name: Sign plugin
        env:
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin

      - name: Generate updatePlugins.xml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIGNED="claude-watch-${VERSION}-signed.zip"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${SIGNED}"
          cat > build/distributions/updatePlugins.xml <<EOF
          <plugins>
            <plugin id="dev.hemendra.claudewatch" url="${URL}" version="${VERSION}">
              <idea-version since-build="242" until-build="261.*"/>
              <name>Claude Watch</name>
            </plugin>
          </plugins>
          EOF

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/distributions/*-signed.zip
            build/distributions/updatePlugins.xml

      - name: Publish to JetBrains Marketplace
        env:
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          if [ -n "$PUBLISH_TOKEN" ]; then
            ./gradlew publishPlugin
          else
            echo "PUBLISH_TOKEN not set — skipping Marketplace upload."
          fi
